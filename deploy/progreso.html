<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Progreso — G2FIT Nutrición</title>
  <!-- Open Graph para WhatsApp / redes sociales -->
  <meta property="og:title" content="Mi Progreso — G2FIT Nutrición">
  <meta property="og:description" content="Tu seguimiento personalizado de peso y medidas con G2FIT Nutrición">
  <meta property="og:image" content="https://g2fit.es/wp-content/uploads/2024/06/cropped-IMG_5187-1-180x85.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --pink: #FB5FAB; --pink-dark: #d63c8e;
      --bg: #0F172A; --surface: #1E293B; --surface2: #162240;
      --border: rgba(251,95,171,0.15); --text: #F1F5F9; --muted: #64748B;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh;
      background-image: radial-gradient(ellipse 80% 50% at 20% 0%, rgba(251,95,171,0.07) 0%, transparent 60%); }
    nav { display:flex; align-items:center; gap:12px; padding:14px 32px; border-bottom:1px solid var(--border);
      background:rgba(15,23,42,0.95); backdrop-filter:blur(12px); position:sticky; top:0; z-index:100; }
    .logo-text { font-weight:800; font-size:17px; letter-spacing:-0.5px; }
    .logo-text span { color:var(--pink); }
    .container { max-width:900px; margin:0 auto; padding:32px 24px; }
    .hero { background:var(--surface); border:1px solid var(--border); border-radius:20px;
      padding:28px 32px; margin-bottom:24px; display:flex; align-items:center; gap:24px; }
    .hero-avatar { width:64px; height:64px; border-radius:16px;
      background:linear-gradient(135deg,var(--pink) 0%,var(--pink-dark) 100%);
      display:flex; align-items:center; justify-content:center; font-size:28px; flex-shrink:0; }
    .hero-info h2 { font-size:22px; font-weight:700; margin-bottom:4px; }
    .hero-info p { color:var(--muted); font-size:14px; }
    .grid3 { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:24px; }
    .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; text-align:center; }
    .stat-value { font-size:26px; font-weight:800; color:var(--pink); margin-top:4px; }
    .stat-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; }
    .chart-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:24px; }
    .chart-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:20px; }
    .chart-title { font-size:14px; font-weight:600; color:var(--pink); margin-bottom:14px; }
    .progress-section { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:20px; margin-bottom:24px; }
    .progress-section h3 { font-size:16px; font-weight:600; margin-bottom:16px; }
    .progress-row { display:flex; justify-content:space-between; align-items:center;
      padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.05); font-size:14px; }
    .progress-row:last-child { border:none; }
    .badge-obj { display:inline-block; padding:3px 10px; border-radius:20px; font-size:12px; font-weight:600;
      background:rgba(251,95,171,0.15); color:var(--pink); border:1px solid rgba(251,95,171,0.3); }
    .msg-card { border-radius:16px; padding:24px 28px; margin-bottom:24px;
      background: linear-gradient(135deg, rgba(251,95,171,0.12) 0%, rgba(214,60,142,0.07) 100%);
      border: 1px solid rgba(251,95,171,0.3); }
    .msg-card h3 { font-size:18px; font-weight:700; color:var(--pink); margin-bottom:10px; }
    .msg-card p { font-size:15px; line-height:1.65; color:#cbd5e1; }
    .empty { text-align:center; padding:60px 20px; color:var(--muted); }
    .empty-icon { font-size:48px; margin-bottom:12px; }
    @media (max-width:640px) {
      .grid3 { grid-template-columns:1fr 1fr; }
      .chart-grid { grid-template-columns:1fr; }
      nav { padding:12px 16px; }
      .container { padding:20px 16px; }
      .hero { flex-direction:column; text-align:center; }
      .msg-card { padding:20px; }
      .msg-card h3 { font-size:16px; }
      .msg-card p { font-size:14px; }
    }
  </style>
</head>
<body>
  <nav>
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#FB5FAB,#d63c8e);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;flex-shrink:0">G</div>
      <div class="logo-text">G2<span>FIT</span> <span style="color:var(--muted);font-weight:400;font-size:14px">Nutrición</span></div>
    </div>
  </nav>

  <div class="container" id="app">
    <div class="empty"><div class="empty-icon">⏳</div><p>Cargando tu progreso...</p></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://blardvkldwwbhgdmsxhd.supabase.co';
    const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJsYXJkdmtsZHd3YmhnZG1zeGhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMjMyMzIsImV4cCI6MjA4NzU5OTIzMn0.vZXMw7_M70-aWp8yTw022dZz2yQKZaL1aXuDyGm-xo8';
    const OBJETIVO_LABEL = { perder_peso:'Perder peso', ganar_masa:'Ganar masa muscular', mantener:'Mantener peso', definicion:'Definición' };
    const h = { 'apikey': ANON_KEY, 'Authorization': `Bearer ${ANON_KEY}`, 'Content-Type': 'application/json' };

    async function init() {
      const token = new URLSearchParams(window.location.search).get('c');
      if (!token) { showError('Enlace no válido'); return; }
      try {
        const r1 = await fetch(`${SUPABASE_URL}/rest/v1/clientes?link_token=eq.${token}&select=*`, { headers: h });
        if (!r1.ok) throw new Error('Error al cargar datos');
        const clientes = await r1.json();
        if (!clientes.length) { showError('Enlace no encontrado o expirado'); return; }
        const c = clientes[0];
        const r2 = await fetch(`${SUPABASE_URL}/rest/v1/seguimiento_clientes?cliente_id=eq.${c.id}&order=fecha.asc`, { headers: h });
        const seguimiento = r2.ok ? await r2.json() : [];
        const variant = parseInt(new URLSearchParams(window.location.search).get('v') || '0');
        render(c, seguimiento, variant);
      } catch(e) { showError(e.message); }
    }

    function showError(msg) {
      document.getElementById('app').innerHTML = `<div class="empty"><div class="empty-icon">❌</div><p>${msg}</p></div>`;
    }

    function generarMensaje(c, seguimiento, difPeso, primera, ultima, variant = 0) {
      const nombre = (c.nombre || '').split(' ')[0] || 'campeón';
      const obj = c.objetivo;
      const numReg = seguimiento.length;
      const difNum = difPeso !== null ? parseFloat(difPeso) : null;
      const v = variant === 1 ? 1 : 0;

      const difContorno2 = (ultima?.contorno_abdominal_2 && primera?.contorno_abdominal_2)
        ? parseFloat((ultima.contorno_abdominal_2 - primera.contorno_abdominal_2).toFixed(1))
        : null;

      if (numReg <= 1) {
        return v === 0
          ? { titulo: 'Bienvenida a tu plan personalizado', texto: `${nombre}, me alegra que hayas dado el paso. Los primeros días son de adaptación — cada comida siguiendo el plan es una pequeña victoria que va en la dirección correcta. Confía en el trabajo que hemos hecho juntos para diseñar tu dieta.` }
          : { titulo: 'El plan está listo para ti', texto: `${nombre}, he diseñado tu dieta pensando en tu objetivo y tu ritmo de vida. Los primeros días pueden ser de ajuste — es completamente normal. Si tienes cualquier duda, no dudes en consultarme.` };
      }

      if (obj === 'perder_peso' || obj === 'definicion') {
        if (difNum <= -4) {
          const xtr = difContorno2 !== null && difContorno2 < 0 ? ` Tu contorno abdominal también ha bajado ${Math.abs(difContorno2)} cm.` : '';
          return v === 0
            ? { titulo: 'Los resultados están ahí', texto: `${nombre}, desde que empezaste llevas ${Math.abs(difNum)} kg menos.${xtr} Veo que el plan está funcionando exactamente como esperaba. Lo más difícil ya lo has demostrado: que puedes hacerlo.` }
            : { titulo: 'Un trabajo que se nota', texto: `${nombre}, ${Math.abs(difNum)} kg menos desde el inicio es exactamente el tipo de cambio que buscábamos cuando diseñamos el plan.${xtr} Sigue con la misma constancia y seguiremos viendo resultados.` };
        }
        if (difNum <= -2) {
          return v === 0
            ? { titulo: 'El ritmo correcto', texto: `${nombre}, llevas ${Math.abs(difNum)} kg menos y vas al ritmo que busco para que la pérdida sea de grasa sin perder músculo. Este tipo de progreso, aunque parece lento, es el que se mantiene a largo plazo.` }
            : { titulo: 'Progresando bien', texto: `${nombre}, bajar ${Math.abs(difNum)} kg es exactamente lo que esperaba en esta fase del plan. Tu cuerpo está respondiendo bien y tú estás poniendo el trabajo. Sigue así.` };
        }
        if (difNum < 0) {
          const xtr = difContorno2 !== null && difContorno2 < 0
            ? ` Y fíjate que el contorno abdominal ya ha bajado ${Math.abs(difContorno2)} cm — a veces el cuerpo cambia antes de que lo haga el peso.`
            : '';
          return v === 0
            ? { titulo: 'La tendencia es la correcta', texto: `${nombre}, el peso ya lleva ${Math.abs(difNum)} kg menos respecto al inicio.${xtr} Las primeras semanas son siempre de adaptación — lo que me importa es que la dirección ya es la correcta. Mantén el plan.` }
            : { titulo: 'Los primeros cambios ya son visibles', texto: `${nombre}, los primeros kilos son siempre los más costosos.${xtr} El cuerpo tarda unas semanas en adaptarse al plan, pero ya lo está haciendo. Dale tiempo y sigue con la misma constancia.` };
        }
        if (difNum < 1) {
          return v === 0
            ? { titulo: 'El cuerpo se está adaptando', texto: `${nombre}, es normal que el peso no se mueva al mismo ritmo siempre. Hay semanas en que el cuerpo retiene líquidos o ajusta su composición — lo he visto muchas veces. Si sigues con el plan, los resultados van a volver.` }
            : { titulo: 'Los cambios no siempre se miden en la báscula', texto: `${nombre}, una fase sin gran variación no significa que el plan no esté funcionando — lo sé por experiencia. Tu cuerpo puede estar cambiando por dentro aunque la báscula no lo muestre todavía. Si quieres revisar algo, escríbeme.` };
        }
        return v === 0
          ? { titulo: 'Momento de revisarlo juntos', texto: `${nombre}, tu cuerpo puede estar respondiendo de forma diferente a lo que esperaba. Eso no es un fracaso — es información útil para que ajuste el plan. Te recomiendo que me escribas para que lo revisemos juntos.` }
          : { titulo: 'El plan puede necesitar ajustes', texto: `${nombre}, hay ocasiones en que el primer enfoque no es el definitivo — y eso es completamente normal. Lo importante es ir afinando hasta encontrar lo que mejor funciona para ti. Escríbeme cuando puedas para que lo revisemos.` };
      }

      if (obj === 'ganar_masa') {
        if (difNum >= 3) {
          return v === 0
            ? { titulo: 'La ganancia muscular está en marcha', texto: `${nombre}, llevas ${difNum} kg más desde que empezaste. Si estás entrenando con regularidad, buena parte de ese peso corresponde a tejido muscular — exactamente lo que buscábamos con el plan. Sigue igual.` }
            : { titulo: 'El plan está dando resultados', texto: `${nombre}, ${difNum} kg ganados es una señal clara de que el plan está funcionando tal como lo diseñé. La ganancia muscular real es siempre lenta y progresiva. Mantén la constancia y seguiremos en esa línea.` };
        }
        if (difNum >= 1) {
          return v === 0
            ? { titulo: 'La base se está construyendo', texto: `${nombre}, llevas ${difNum} kg más desde el inicio. El cuerpo necesita tiempo para ganar masa muscular de forma sólida — eso es algo que siempre recalco. Unos kilogramos bien ganados valen más que ganancias rápidas.` }
            : { titulo: 'Construyendo en la dirección correcta', texto: `${nombre}, ${difNum} kg ganados es el ritmo que busco en esta fase del plan. La ganancia muscular se construye semana a semana — sigue con el plan y con los entrenamientos, y los cambios se irán notando más con el tiempo.` };
        }
        return v === 0
          ? { titulo: 'Los cimientos primero', texto: `${nombre}, en las primeras semanas el cuerpo se adapta sin que el peso cambie mucho — es algo que veo con frecuencia. La fuerza y el rendimiento en los entrenamientos mejoran antes que el número de la báscula. Sigue con el plan y dale tiempo al proceso.` }
          : { titulo: 'El proceso lleva su tiempo', texto: `${nombre}, construir masa muscular es el proceso más lento que trabajo con mis clientes. Lo que el cuerpo construye bien y despacio, se queda. Las semanas de constancia con el plan y los entrenamientos se van sumando.` };
      }

      // mantener
      if (Math.abs(difNum) <= 1.5) {
        return v === 0
          ? { titulo: 'El peso se mantiene estable', texto: `${nombre}, mantener el peso dentro de esos márgenes requiere consistencia — y lo estás consiguiendo. Sigue con los mismos hábitos, porque están funcionando.` }
          : { titulo: 'Equilibrio controlado', texto: `${nombre}, una variación mínima respecto al inicio es exactamente lo que buscaba con el plan. Estás siguiendo el camino correcto.` };
      }
      if (difNum < -1.5) {
        return v === 0
          ? { titulo: 'Los resultados superan el objetivo', texto: `${nombre}, llevas ${Math.abs(difNum)} kg menos desde que empezaste. Aunque orienté el plan inicial a mantener, tu cuerpo ha respondido más allá de eso — y me parece muy positivo. Si quieres seguir en esta línea, puedo ajustar el plan para que el progreso continúe.` }
          : { titulo: 'El cuerpo ha ido más allá del objetivo', texto: `${nombre}, has bajado ${Math.abs(difNum)} kg desde el inicio, más de lo que marcaba el objetivo inicial. Si este resultado te sienta bien y quieres seguir en esa dirección, coméntamelo y ajusto el plan para acompañar ese camino.` };
      }
      return v === 0
        ? { titulo: 'Pequeño ajuste en marcha', texto: `${nombre}, hay una pequeña oscilación hacia arriba respecto al objetivo. No es un problema — es información para que pueda ajustar el plan si hace falta. Escríbeme si quieres revisarlo.` }
        : { titulo: 'El mantenimiento tiene sus márgenes', texto: `${nombre}, el peso nunca es una línea plana — tiene oscilaciones naturales, lo sé bien. Lo importante es la tendencia a medio plazo. Si la oscilación persiste, podemos hacer pequeños ajustes.` };
    }

    function render(c, seguimiento, variant = 0) {
      const nombre = `${c.nombre||''} ${c.apellidos||''}`.trim();
      const ultima = seguimiento.length ? seguimiento[seguimiento.length - 1] : null;
      const primera = seguimiento.length ? seguimiento[0] : null;

      const pesoActual = ultima?.peso || c.peso_actual;
      const pesoInicial = primera?.peso || c.peso_actual;
      const difPeso = pesoActual && pesoInicial ? (pesoActual - pesoInicial).toFixed(1) : null;
      const difNum = difPeso !== null ? parseFloat(difPeso) : null;

      const medActual = ultima || { contorno_abdominal_1: c.contorno_abdominal_1, contorno_abdominal_2: c.contorno_abdominal_2, contorno_abdominal_3: c.contorno_abdominal_3 };

      // Color variación según objetivo
      const esBuenoCambioPositivo = c.objetivo === 'ganar_masa';
      let colorVariacion = 'var(--muted)';
      if (difNum !== null && difNum !== 0) {
        const esPositivo = difNum > 0;
        colorVariacion = (esPositivo === esBuenoCambioPositivo) ? 'var(--pink)' : '#ef4444';
      }

      const msg = generarMensaje(c, seguimiento, difPeso, primera, ultima, variant);

      const html = `
        <div class="hero">
          <div class="hero-avatar">💪</div>
          <div class="hero-info">
            <h2>${nombre || 'Cliente'}</h2>
            <p>Objetivo: <span class="badge-obj">${OBJETIVO_LABEL[c.objetivo]||c.objetivo||'—'}</span></p>
            ${c.tiempo_objetivo ? `<p style="margin-top:4px;font-size:13px;color:var(--muted)">Tiempo objetivo: ${c.tiempo_objetivo}</p>` : ''}
          </div>
        </div>

        <div class="grid3">
          <div class="stat-card">
            <div class="stat-label">Peso actual</div>
            <div class="stat-value">${pesoActual ? pesoActual + ' kg' : '—'}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Variación total</div>
            <div class="stat-value" style="color:${colorVariacion}">${difNum !== null ? (difNum > 0 ? '+' : '') + difNum + ' kg' : '—'}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Seguimientos</div>
            <div class="stat-value">${seguimiento.length}</div>
          </div>
        </div>

        ${seguimiento.length >= 2 ? `
        <div class="chart-grid">
          <div class="chart-card"><div class="chart-title">Evolución del peso</div><canvas id="c-peso" height="200"></canvas></div>
          <div class="chart-card"><div class="chart-title">Contornos abdominales</div><canvas id="c-med" height="200"></canvas></div>
        </div>` : ''}

        <div class="progress-section">
          <h3>Medidas actuales</h3>
          <div class="progress-row"><span style="color:var(--muted)">Contorno superior (4 dedos sobre ombligo)</span><strong>${medActual.contorno_abdominal_1 ? medActual.contorno_abdominal_1 + ' cm' : '—'}</strong></div>
          <div class="progress-row"><span style="color:var(--muted)">Contorno a nivel del ombligo</span><strong>${medActual.contorno_abdominal_2 ? medActual.contorno_abdominal_2 + ' cm' : '—'}</strong></div>
          <div class="progress-row"><span style="color:var(--muted)">Contorno inferior (4 dedos bajo ombligo)</span><strong>${medActual.contorno_abdominal_3 ? medActual.contorno_abdominal_3 + ' cm' : '—'}</strong></div>
          <div class="progress-row"><span style="color:var(--muted)">Peso actual</span><strong>${pesoActual ? pesoActual + ' kg' : '—'}</strong></div>
          <div class="progress-row"><span style="color:var(--muted)">Altura</span><strong>${c.altura ? c.altura + ' cm' : '—'}</strong></div>
          ${c.imc ? `<div class="progress-row"><span style="color:var(--muted)">IMC</span><strong>${c.imc}</strong></div>` : ''}
        </div>

        <div class="msg-card">
          <h3>${msg.titulo}</h3>
          <p>${msg.texto}</p>
        </div>

        <div style="text-align:center;padding:16px 0 8px;color:var(--muted);font-size:13px">
          Progreso compartido por tu nutricionista · <strong style="color:var(--pink)">G2FIT Nutrición</strong>
        </div>
      `;
      document.getElementById('app').innerHTML = html;

      if (seguimiento.length >= 2) {
        const labels = seguimiento.map(m => new Date(m.fecha + 'T00:00:00').toLocaleDateString('es-ES', { day: '2-digit', month: 'short' }));
        const chartOpts = (datasets) => ({
          type: 'line', data: { labels, datasets },
          options: {
            responsive: true,
            plugins: { legend: { labels: { color: '#94a3b8', font: { size: 11 }, boxWidth: 12 } } },
            scales: {
              x: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.05)' } },
              y: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.05)' } }
            }
          }
        });
        new Chart(document.getElementById('c-peso').getContext('2d'), chartOpts([{
          label: 'Peso (kg)', data: seguimiento.map(m => m.peso),
          borderColor: '#FB5FAB', backgroundColor: 'rgba(251,95,171,0.1)', tension: 0.3, pointRadius: 4, fill: true, pointBackgroundColor: '#FB5FAB'
        }]));
        new Chart(document.getElementById('c-med').getContext('2d'), chartOpts([
          { label: 'Superior', data: seguimiento.map(m => m.contorno_abdominal_1), borderColor: '#FB5FAB', tension: 0.3, pointRadius: 3, pointBackgroundColor: '#FB5FAB' },
          { label: 'Ombligo', data: seguimiento.map(m => m.contorno_abdominal_2), borderColor: '#d63c8e', tension: 0.3, pointRadius: 3, pointBackgroundColor: '#d63c8e' },
          { label: 'Inferior', data: seguimiento.map(m => m.contorno_abdominal_3), borderColor: '#818cf8', tension: 0.3, pointRadius: 3, pointBackgroundColor: '#818cf8' },
        ]));
      }
    }

    init();
  </script>
</body>
</html>
